infer_prompts:
  - id: infer_short_factual
    text: "What is cosine similarity and why is it used for semantic search?"

  - id: infer_medium_reasoning
    text: >
      A train leaves station A at 9:00 AM traveling at 80 km/h.
      Another train leaves station B at 10:00 AM traveling toward station A at 60 km/h.
      The distance between A and B is 280 km. At what time do the trains meet?
      Show your work step by step.

  - id: infer_code_generation
    text: >
      Write a Go function called `retry` that takes a function `fn func() error`,
      a maximum number of attempts `maxAttempts int`, and a delay `delay time.Duration`.
      It should call fn up to maxAttempts times, sleeping delay between failures,
      and return the last error if all attempts fail. Include a doc comment.

  - id: infer_summarization
    text: >
      Summarize the following in three sentences:
      Large language models (LLMs) are neural networks pretrained on massive corpora
      of text. They learn to predict the next token given context and develop
      emergent capabilities such as reasoning, code generation, and instruction
      following. Fine-tuning with human feedback (RLHF) further aligns their
      behavior with human preferences. They are deployed via APIs and locally
      with quantization techniques that reduce memory requirements significantly
      while preserving most of their capability.

  - id: infer_creative
    text: "Write a haiku about running a language model on a laptop."

  - id: infer_analysis
    text: >
      What are three key tradeoffs a developer must consider when choosing between
      a 1B parameter quantized model running locally versus a 70B parameter model
      accessed via API for a customer-facing chatbot application?

  - id: infer_long_prompt
    text: >
      You are evaluating two approaches to building a question-answering system
      for internal company documentation. Approach A uses a fine-tuned small model
      (1.5B parameters, 4-bit quantized) running on-device with RAG over embedded
      company docs. Approach B uses a large frontier model API with all docs in
      context via long-context processing. Consider the following dimensions:
      latency, data privacy, cost at scale, freshness of information, accuracy
      on domain-specific queries, and ease of maintenance. Write a structured
      comparison covering each dimension with a final recommendation.

